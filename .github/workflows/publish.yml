name: Publish Works PWA

on:
  workflow_dispatch:      # fired by auditable's release (gh workflow run) + manual
  push:
    branches: [main]      # redeploy when the PWA shell (manifest/sw/icon) changes

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      # Consume auditable's latest released build — never rebuild it here.
      # Consume auditable's latest released build — never rebuild it here.
      # works-core = the lean PWA base; works-all = the /full monolith; packages.zip
      # = the same-origin code-package catalog; auditable = the standalone notebook.
      - name: Fetch latest auditable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dl
          gh release download --repo gentropic/auditable --pattern 'works-core.html' --dir dl
          gh release download --repo gentropic/auditable --pattern 'works-all.html' --dir dl
          gh release download --repo gentropic/auditable --pattern 'packages.zip' --dir dl
          gh release download --repo gentropic/auditable --pattern 'auditable.html' --dir dl
          unzip -qo dl/packages.zip -d dl/packages

      # publish.mjs assembles: works-core → index.html (lean PWA, manifest+sw),
      # works-all → full/, packages → packages/ (same-origin catalog), auditable →
      # auditable/. Then stage the shell + all four into _site.
      - name: Assemble the PWA
        run: |
          node publish.mjs ./dl
          mkdir -p _site
          cp index.html manifest.webmanifest sw.js icon.svg .nojekyll _site/
          cp -r auditable full packages _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
